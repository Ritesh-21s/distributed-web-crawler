<!DOCTYPE html>
<html>

    <head>
        <title>WebScour Search</title>

        <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:80px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            
        }

        input{
            width:400px;
            padding:10px;
            font-size:18px;
        }

        button{
            padding:10px 20px;
            font-size:18px;
            cursor:pointer;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
        }

        button:hover{
            background:#0056b3;
        }

        #results{
            margin-top:40px;
            width:600px;
            margin-left:auto;
            margin-right:auto;
        }


        .result-card{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:8px;
            box-shadow:0px 2px 6px rgba(0,0,0,0.2);
            text-align:left;
        }

        .doc{
            font-size:18px;
            font-weight:bold;
        }

        .score{
            color:green;
            font-size:14px;
        }

        </style>

    </head>

    <body>

        <h1>WebScour Search Engine</h1>

        <input id="query" type="text" placeholder="Enter search query">

        <button onclick="search()">Search</button>

        <div id="results"></div>


        <script>

            async function search(){

                let q=document.getElementById("query").value;

                let response=await fetch("/search?q="+q);

                let data=await response.json();

                let resultsDiv=document.getElementById("results");

                resultsDiv.innerHTML="";

                data.forEach(item=>{

                    let card=document.createElement("div");

                    card.className="result-card";

                    card.innerHTML=
                    "<div class='doc'>Document "+item.document+"</div>" +
                    "<div class='score'>Score: "+item.score+"</div>";

                    resultsDiv.appendChild(card);

                });

            }

        </script>

    </body>

</html>
